<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unity Asset Classifier</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-theme="dark">
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Unity Asset Classifier</h1>
          <p>이미 임포트된 Assets 폴더를 태그별로 정리</p>
        </div>
        <div class="topbar-actions">
          <button id="themeToggleBtn" class="theme-toggle" type="button" aria-pressed="true">
            <span class="theme-toggle-track"><span class="theme-toggle-thumb"></span></span>
            <span id="themeToggleText">다크</span>
          </button>
          <button id="refreshBtn" class="icon-btn" title="다시 스캔">↻</button>
          <button id="saveConfigBtn" class="primary-btn">설정 저장</button>
        </div>
      </header>

      <section class="layout">
        <aside class="side-panel">
          <h2>폴더</h2>
          <label>
            Assets 폴더
            <input id="assetsRootInput" type="text" spellcheck="false" />
          </label>
          <label>
            스캔 제외 최상위 폴더
            <input id="ignoredInput" type="text" spellcheck="false" />
          </label>
          <div class="hint">
            제외 목록에는 이미 정리된 태그 폴더와 Unity 공용 폴더를 넣습니다. 쉼표로 구분합니다.
          </div>

        </aside>

        <section class="work-area">
          <div class="toolbar">
            <label class="select-all-row" title="현재 보이는 항목 전체 선택">
              <input id="selectAllInput" type="checkbox" />
              전체 선택
            </label>
            <div class="segmented">
              <button class="active" data-filter="all">전체</button>
              <button data-filter="vendor">판매자 그룹</button>
              <button data-filter="root">단일 에셋</button>
              <button data-filter="untagged">태그 없음</button>
            </div>
            <div class="toolbar-spacer"></div>
            <select id="bulkTagSelect" aria-label="선택 항목 태그"></select>
            <button id="applyTagBtn" class="secondary-btn">태그 적용</button>
            <button id="vendorGroupBtn" class="secondary-btn">판매자 그룹으로 보기</button>
            <button id="organizeBtn" class="primary-btn">선택 항목 정리</button>
          </div>

          <div class="summary" id="summaryText">스캔 대기</div>
          <div class="tree-wrap">
            <div id="treeRoot" class="tree-root"></div>
            <div id="emptyState" class="empty-state">표시할 항목 없음</div>
          </div>
        </section>

        <aside class="tag-panel">
          <h2>태그</h2>
          <div class="preset-row" id="presetColors"></div>
          <div id="tagList" class="tag-list"></div>
          <div class="tag-editor">
            <input id="newTagNameInput" type="text" placeholder="새 태그" />
            <input id="newTagColorInput" type="color" value="#2563eb" />
            <button id="addTagBtn" class="secondary-btn">추가</button>
          </div>
        </aside>
      </section>

      <footer class="statusbar">
        <span id="statusText">준비됨</span>
      </footer>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
